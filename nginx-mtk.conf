# /etc/nginx/sites-available/mtk
# Bu dosyayı sunucunuza kopyalayın

server {
    listen 80;
    server_name _; # Buraya domain adınızı yazın (örn: mehmettalhakaya.com)

    # Statik dosyalar (mevcut siteniz + login/register sayfaları)
    root /var/www/mtk/public;
    index index.html;

    # Genel istekler - önce statik dosya dene, yoksa Node.js'e yönlendir
    location / {
        try_files $uri $uri/ @backend;
    }

    # API istekleri - direkt Node.js'e yönlendir
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Statik dosya bulunamazsa backend'e yönlendir
    location @backend {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
